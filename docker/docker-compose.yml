services:
  api:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://kip:kip@db:5432/kip
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kip
      POSTGRES_USER: kip
      POSTGRES_PASSWORD: kip
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
