services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: sqlite:///./kip.db
      CORS_ORIGINS: http://localhost:5001,http://127.0.0.1:5001
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        KIP_API_BASE_URL: http://localhost:8000
    ports:
      - "5001:5001"
    depends_on:
      backend:
        condition: service_healthy
